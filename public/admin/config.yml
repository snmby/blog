backend:
  name: github
  repo: snmby/blog
  branch: master
  app_id: Ov23li8gb8HU2aSnU3xp
  base_url: https://decap-auth-snmby.snmby-blog.workers.dev
  auth_endpoint: auth
media_folder: public/uploads
public_folder: /blog/uploads
site_url: https://bolgwelt.top
display_url: https://bolgwelt.top
logo_url: /favicon/favicon.ico
locale: zh
publish_mode: editorial_workflow

collections:
  - name: posts
    label: 文章
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: true
    fields:
      - { label: 标题, name: title, widget: string }
      - { label: 发布时间, name: published, widget: datetime }
      - { label: 更新时间, name: updated, widget: datetime, required: false }
      - { label: 草稿, name: draft, widget: boolean, default: false }
      - { label: 描述, name: description, widget: text, required: false }
      - { label: 封面图, name: image, widget: image, required: false }
      - { label: 标签, name: tags, widget: list, required: false, default: [] }
      - { label: 分类, name: category, widget: string, required: false }
      - { label: 语言, name: lang, widget: string, required: false }
      - { label: 置顶, name: pinned, widget: boolean, required: false, default: false }
      - { label: 作者, name: author, widget: string, required: false }
      - { label: 来源链接, name: sourceLink, widget: string, required: false }
      - { label: 许可证名, name: licenseName, widget: string, required: false }
      - { label: 许可证链接, name: licenseUrl, widget: string, required: false }
      - { label: 评论, name: comment, widget: boolean, required: false, default: true }
      - { label: 密码, name: password, widget: string, required: false }
      - { label: 密码提示, name: passwordHint, widget: string, required: false }
      - { label: 正文, name: body, widget: markdown }

  - name: spec
    label: 固定页面
    files:
      - label: 关于
        name: about
        file: src/content/spec/about.md
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 描述, name: description, widget: text, required: false }
          - { label: 正文, name: body, widget: markdown }
      - label: 友链
        name: friends
        file: src/content/spec/friends.mdx
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 描述, name: description, widget: text, required: false }
          - { label: 正文, name: body, widget: markdown }
      - label: 留言
        name: guestbook
        file: src/content/spec/guestbook.md
        fields:
          - { label: 标题, name: title, widget: string }
          - { label: 正文, name: body, widget: markdown }
