backend:
  name: github
  repo: snmby/blog
  branch: master
  app_id: Ov23li8gb8HU2aSnU3xp
  base_url: https://decap-auth-snmby.snmby-blog.workers.dev
  auth_endpoint: auth

media_folder: public/uploads
public_folder: /blog/uploads
site_url: https://bolgwelt.top
display_url: https://bolgwelt.top
logo_url: /favicon/favicon.ico
locale: en
publish_mode: editorial_workflow

collections:
  - name: posts
    label: Articles
    folder: src/content/posts
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: true
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Published, name: published, widget: datetime }
      - { label: Updated, name: updated, widget: datetime, required: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - { label: Description, name: description, widget: text, required: false }
      - { label: Cover Image, name: image, widget: image, required: false }
      - { label: Tags, name: tags, widget: list, required: false, default: [] }
      - { label: Category, name: category, widget: string, required: false }
      - { label: Language, name: lang, widget: string, required: false }
      - { label: Pinned, name: pinned, widget: boolean, required: false, default: false }
      - { label: Author, name: author, widget: string, required: false }
      - { label: Source Link, name: sourceLink, widget: string, required: false }
      - { label: License Name, name: licenseName, widget: string, required: false }
      - { label: License URL, name: licenseUrl, widget: string, required: false }
      - { label: Comments, name: comment, widget: boolean, required: false, default: true }
      - { label: Password, name: password, widget: string, required: false }
      - { label: Password Hint, name: passwordHint, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: spec
    label: Pages
    files:
      - label: About
        name: about
        file: src/content/spec/about.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: Friends
        name: friends
        file: src/content/spec/friends.mdx
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: text, required: false }
          - { label: Body, name: body, widget: markdown }
      - label: Guestbook
        name: guestbook
        file: src/content/spec/guestbook.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Body, name: body, widget: markdown }
